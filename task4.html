<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Modern Music Player</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:radial-gradient(circle,#1a1a2e,#0f0f1a);
    font-family:Arial,sans-serif;
    color:white;
}

.player{
    width:380px;
    padding:20px;
    border-radius:20px;
    background:rgba(255,255,255,0.05);
    backdrop-filter:blur(15px);
    box-shadow:0 0 30px rgba(0,0,0,.5);
}

h2{
    text-align:center;
    margin-bottom:10px;
}

.wave{
    display:flex;
    justify-content:center;
    gap:5px;
    margin:10px 0;
}

.wave div{
    width:5px;
    height:20px;
    background:#00bcd4;
    border-radius:10px;
    animation:bounce 1s infinite ease-in-out;
}

.wave div:nth-child(2){animation-delay:.2s;}
.wave div:nth-child(3){animation-delay:.4s;}
.wave div:nth-child(4){animation-delay:.6s;}

@keyframes bounce{
    0%,100%{height:10px;}
    50%{height:35px;}
}

.controls{
    text-align:center;
    margin:15px 0;
}

button{
    background:#222;
    color:white;
    border:none;
    padding:12px;
    border-radius:50%;
    margin:5px;
    cursor:pointer;
    transition:.3s;
}

button:hover{
    background:#00bcd4;
}

.progress{
    width:100%;
    margin-top:10px;
}

.time{
    display:flex;
    justify-content:space-between;
    font-size:12px;
    margin-bottom:8px;
}

input[type=range]{
    width:100%;
    cursor:pointer;
}

.volume-box{
    margin-top:10px;
}

.upload{
    margin-top:15px;
}

.playlist{
    margin-top:15px;
    max-height:180px;
    overflow-y:auto;
}

.song{
    padding:10px;
    margin:6px 0;
    background:rgba(255,255,255,.08);
    border-radius:10px;
    cursor:pointer;
    transition:.3s;
}

.song:hover{
    background:rgba(0,188,212,.4);
}

.active{
    background:#00bcd4 !important;
}
</style>
</head>
<body>

<div class="player">

<h2 id="title">Song A</h2>

<div class="wave" id="wave">
    <div></div>
    <div></div>
    <div></div>
    <div></div>
</div>

<audio id="audio"></audio>

<div class="controls">
    <button onclick="prev()">⏮</button>
    <button onclick="toggle()" id="playBtn">▶</button>
    <button onclick="next()">⏭</button>
</div>

<div class="progress">

<div class="time">
    <span id="current">0:00</span>
    <span id="duration">0:00</span>
</div>

<input type="range" id="seek" value="0">

</div>

<div class="volume-box">
    🔊 Volume
    <input type="range" id="volume" min="0" max="1" step="0.1" value="1">
</div>

<div class="upload">
    📁 Add MP3
    <input type="file" id="upload" accept="audio/*">
</div>

<div class="playlist" id="playlist"></div>

</div>

<script>

const songs = [
{
name:"Song A",
src:"https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3"
},
{
name:"Song B",
src:"https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3"
},
{
name:"Song C",
src:"https://www.soundhelix.com/examples/mp3/SoundHelix-Song-3.mp3"
}
];

let index = 0;

const audio = document.getElementById("audio");
const title = document.getElementById("title");
const wave = document.getElementById("wave");
const playBtn = document.getElementById("playBtn");
const playlist = document.getElementById("playlist");

function loadSong(i){

audio.src = songs[i].src;
title.textContent = songs[i].name;

document.querySelectorAll(".song").forEach(el=>{
el.classList.remove("active");
});

if(document.querySelectorAll(".song")[i]){
document.querySelectorAll(".song")[i].classList.add("active");
}
}

function toggle(){

if(audio.paused){

audio.play();
playBtn.innerHTML="⏸";
wave.style.display="flex";

}else{

audio.pause();
playBtn.innerHTML="▶";
wave.style.display="none";
}
}

function next(){

index=(index+1)%songs.length;
loadSong(index);

audio.play();
playBtn.innerHTML="⏸";
wave.style.display="flex";
}

function prev(){

index=(index-1+songs.length)%songs.length;
loadSong(index);

audio.play();
playBtn.innerHTML="⏸";
wave.style.display="flex";
}

function renderPlaylist(){

playlist.innerHTML="";

songs.forEach((song,i)=>{

const div=document.createElement("div");

div.className="song";
div.innerText=song.name;

div.onclick=()=>{

index=i;
loadSong(i);

audio.play();
playBtn.innerHTML="⏸";
wave.style.display="flex";
};

playlist.appendChild(div);

});

}

renderPlaylist();

document.getElementById("volume").addEventListener("input",(e)=>{
audio.volume=e.target.value;
});

const seek=document.getElementById("seek");

audio.addEventListener("timeupdate",()=>{

seek.max=audio.duration || 0;
seek.value=audio.currentTime;

document.getElementById("current").innerText=
formatTime(audio.currentTime);

document.getElementById("duration").innerText=
formatTime(audio.duration);

});

seek.addEventListener("input",()=>{
audio.currentTime=seek.value;
});

function formatTime(sec){

if(isNaN(sec)) return "0:00";

let min=Math.floor(sec/60);
let s=Math.floor(sec%60);

if(s<10) s="0"+s;

return min+":"+s;
}

audio.addEventListener("ended",()=>{
next();
});

document.getElementById("upload")
.addEventListener("change",(e)=>{

const file=e.target.files[0];

if(!file) return;

const url=URL.createObjectURL(file);

songs.push({
name:file.name,
src:url
});

renderPlaylist();

});

document.addEventListener("keydown",(e)=>{

if(e.code==="Space"){
e.preventDefault();
toggle();
}

if(e.code==="ArrowRight"){
next();
}

if(e.code==="ArrowLeft"){
prev();
}

});

loadSong(index);

wave.style.display="none";

</script>

</body>
</html>
