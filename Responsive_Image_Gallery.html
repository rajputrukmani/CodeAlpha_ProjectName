<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Responsive Image Gallery</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    background:#f5f5f5;
}

/* Header */
header{
    background:#0f172a;
    color:white;
    text-align:center;
    padding:25px;
}

header h1{
    margin-bottom:8px;
}

/* Filter Buttons */
.filters{
    text-align:center;
    padding:20px;
}

.filters button{
    padding:10px 18px;
    margin:5px;
    border:none;
    border-radius:30px;
    background:#0f172a;
    color:white;
    cursor:pointer;
    transition:.3s;
}

.filters button:hover,
.filters button.active{
    background:#38bdf8;
}

/* Gallery */
.gallery{
    max-width:1200px;
    margin:auto;
    padding:20px;
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
    gap:20px;
}

.item{
    overflow:hidden;
    border-radius:15px;
    background:white;
    box-shadow:0 4px 12px rgba(0,0,0,.1);
    cursor:pointer;
}

.item img{
    width:100%;
    height:250px;
    object-fit:cover;
    transition:.4s;
}

.item:hover img{
    transform:scale(1.1);
}

/* Lightbox */
.lightbox{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,.9);
    display:none;
    justify-content:center;
    align-items:center;
    z-index:1000;
}

.lightbox img{
    max-width:90%;
    max-height:80vh;
    border-radius:10px;
}

.close{
    position:absolute;
    top:20px;
    right:30px;
    color:white;
    font-size:40px;
    cursor:pointer;
}

.nav{
    position:absolute;
    top:50%;
    transform:translateY(-50%);
    font-size:35px;
    background:rgba(255,255,255,.2);
    color:white;
    border:none;
    padding:10px 18px;
    cursor:pointer;
    border-radius:50%;
}

.prev{
    left:20px;
}

.next{
    right:20px;
}

/* Footer */
footer{
    text-align:center;
    background:#0f172a;
    color:white;
    padding:15px;
    margin-top:20px;
}

@media(max-width:768px){

    .gallery{
        grid-template-columns:1fr;
    }

    .item img{
        height:220px;
    }
}
</style>
</head>
<body>

<header>
    <h1>Image Gallery</h1>
    
</header>

<div class="filters">
    <button class="active" data-filter="all">All</button>
    <button data-filter="nature">Nature</button>
    <button data-filter="city">City</button>
    <button data-filter="animals">Animals</button>
</div>

<div class="gallery">

    <div class="item nature">
        <img src="https://images.unsplash.com/photo-1501785888041-af3ef285b470?w=1200" alt="">
    </div>

    <div class="item nature">
        <img src="https://images.unsplash.com/photo-1441974231531-c6227db76b6e?w=1200" alt="">
    </div>

    <div class="item city">
        <img src="https://images.unsplash.com/photo-1514565131-fce0801e5785?w=1200" alt="">
    </div>

    <div class="item city">
        <img src="https://images.unsplash.com/photo-1477959858617-67f85cf4f1df?w=1200" alt="">
    </div>

    <div class="item animals">
        <img src="https://images.unsplash.com/photo-1517423440428-a5a00ad493e8?w=1200" alt="">
    </div>

    <div class="item animals">
        <img src="https://images.unsplash.com/photo-1548199973-03cce0bbc87b?w=1200" alt="">
    </div>

</div>

<!-- Lightbox -->
<div class="lightbox" id="lightbox">

    <span class="close">&times;</span>

    <button class="nav prev">&#10094;</button>

    <img id="lightboxImg">

    <button class="nav next">&#10095;</button>

</div>

<footer>
    © 2026 Image Gallery | Developed by Rukmani
</footer>

<script>

const images = document.querySelectorAll(".item img");
const lightbox = document.getElementById("lightbox");
const lightboxImg = document.getElementById("lightboxImg");

const closeBtn = document.querySelector(".close");
const nextBtn = document.querySelector(".next");
const prevBtn = document.querySelector(".prev");

let currentIndex = 0;

/* Open Lightbox */
images.forEach((img,index)=>{

    img.addEventListener("click",()=>{

        currentIndex = index;
        showImage();

        lightbox.style.display = "flex";
    });
});

/* Show Image */
function showImage(){

    lightboxImg.src = images[currentIndex].src;
}

/* Next */
nextBtn.addEventListener("click",()=>{

    currentIndex = (currentIndex + 1) % images.length;

    showImage();
});

/* Previous */
prevBtn.addEventListener("click",()=>{

    currentIndex = (currentIndex - 1 + images.length) % images.length;

    showImage();
});

/* Close */
closeBtn.addEventListener("click",()=>{

    lightbox.style.display = "none";
});

/* Click Outside */
lightbox.addEventListener("click",(e)=>{

    if(e.target === lightbox){

        lightbox.style.display = "none";
    }
});

/* Filters */
const buttons = document.querySelectorAll(".filters button");
const items = document.querySelectorAll(".item");

buttons.forEach(button=>{

    button.addEventListener("click",()=>{

        buttons.forEach(btn=>btn.classList.remove("active"));

        button.classList.add("active");

        const filter = button.dataset.filter;

        items.forEach(item=>{

            if(filter === "all" || item.classList.contains(filter)){

                item.style.display = "block";

            }else{

                item.style.display = "none";
            }
        });
    });
});

/* Keyboard Navigation */
document.addEventListener("keydown",(e)=>{

    if(lightbox.style.display === "flex"){

        if(e.key === "ArrowRight"){

            currentIndex = (currentIndex + 1) % images.length;
            showImage();
        }

        if(e.key === "ArrowLeft"){

            currentIndex = (currentIndex - 1 + images.length) % images.length;
            showImage();
        }

        if(e.key === "Escape"){

            lightbox.style.display = "none";
        }
    }
});

</script>

</body>
</html>
