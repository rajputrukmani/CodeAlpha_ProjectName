<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Calculator</title>

<style>
  body {
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: linear-gradient(135deg, #1e1e2f, #2b2b45);
    font-family: Arial, sans-serif;
  }

  .calculator {
    width: 320px;
    background: #111;
    padding: 20px;
    border-radius: 20px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.5);
  }

  .display {
    width: 100%;
    height: 60px;
    background: #000;
    color: #0f0;
    font-size: 24px;
    padding: 10px;
    box-sizing: border-box;
    border-radius: 10px;
    text-align: right;
    overflow-x: auto;
  }

  .result-preview {
    font-size: 16px;
    color: #888;
    text-align: right;
    height: 20px;
    margin-top: 5px;
  }

  .buttons {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 10px;
    margin-top: 15px;
  }

  button {
    padding: 18px;
    font-size: 18px;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    background: #222;
    color: #fff;
    transition: 0.2s;
  }

  button:hover {
    background: #333;
  }

  .operator {
    background: #ff9500;
    color: #fff;
  }

  .operator:hover {
    background: #e08900;
  }

  .equal {
    background: #28a745;
  }

  .equal:hover {
    background: #1f7a32;
  }

  .clear {
    background: #dc3545;
  }

  .clear:hover {
    background: #a71d2a;
  }
</style>
</head>

<body>

<div class="calculator">
  <div id="display" class="display"></div>
  <div id="preview" class="result-preview"></div>

  <div class="buttons">
    <button class="clear" onclick="clearDisplay()">C</button>
    <button onclick="deleteLast()">⌫</button>
    <button onclick="append('/')">÷</button>
    <button onclick="append('*')">×</button>

    <button onclick="append('7')">7</button>
    <button onclick="append('8')">8</button>
    <button onclick="append('9')">9</button>
    <button onclick="append('-')" class="operator">−</button>

    <button onclick="append('4')">4</button>
    <button onclick="append('5')">5</button>
    <button onclick="append('6')">6</button>
    <button onclick="append('+')" class="operator">+</button>

    <button onclick="append('1')">1</button>
    <button onclick="append('2')">2</button>
    <button onclick="append('3')">3</button>
    <button class="equal" onclick="calculate()">=</button>

    <button onclick="append('0')" style="grid-column: span 2;">0</button>
    <button onclick="append('.')">.</button>
  </div>
</div>

<script>
  let display = document.getElementById("display");
  let preview = document.getElementById("preview");

  function append(value) {
    display.innerText += value;
    updatePreview();
  }

  function clearDisplay() {
    display.innerText = "";
    preview.innerText = "";
  }

  function deleteLast() {
    display.innerText = display.innerText.slice(0, -1);
    updatePreview();
  }

  function calculate() {
    try {
      display.innerText = eval(display.innerText.replace(/×/g, '*').replace(/÷/g, '/'));
      preview.innerText = "";
    } catch {
      display.innerText = "Error";
      preview.innerText = "";
    }
  }

  function updatePreview() {
    try {
      let expr = display.innerText;
      if (!expr) {
        preview.innerText = "";
        return;
      }
      preview.innerText = eval(expr.replace(/×/g, '*').replace(/÷/g, '/'));
    } catch {
      preview.innerText = "";
    }
  }

  // Keyboard support
  document.addEventListener("keydown", (e) => {
    const key = e.key;

    if (!isNaN(key) || "+-*/.".includes(key)) {
      append(key);
    } 
    else if (key === "Enter") {
      calculate();
    } 
    else if (key === "Backspace") {
      deleteLast();
    } 
    else if (key === "Escape") {
      clearDisplay();
    }
  });
</script>

</body>
</html>
